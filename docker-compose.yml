services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cognoscere
      POSTGRES_USER: cognoscere
      POSTGRES_PASSWORD: cognoscere_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognoscere"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
